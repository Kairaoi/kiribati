# docker-compose.prod.yml
services:
    app:
        container_name: eregistry-app
        build:
            context: .
            dockerfile: Dockerfile.production
        restart: unless-stopped
        environment:
            APP_ENV: production
            APP_DEBUG: false
        depends_on:
            - mysql
            - redis

    mysql:
        container_name: eregistry-mysql
        image: mysql/mysql-server:8.0
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
        volumes:
            - mysql-data:/var/lib/mysql

    nginx:
        image: nginx:alpine
        container_name: eregistry-nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - default

    redis:
        image: redis:alpine
        restart: unless-stopped

volumes:
    mysql-data: